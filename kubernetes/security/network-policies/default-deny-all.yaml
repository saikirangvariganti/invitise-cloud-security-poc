# ============================================================
# Kubernetes NetworkPolicy — Default Deny All
# CIS Benchmark: 5.3.1 | NIST: SC-7 | ISO 27001: A.13.1.3
# Zero-trust baseline: deny all ingress/egress by default.
# Explicit allow policies must be created per workload.
# Required for PCI-DSS network segmentation in fintech.
# ============================================================
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: fintech-app
  labels:
    app.kubernetes.io/managed-by: "security-team"
    compliance: "CIS-5.3.1,NIST-SC-7,PCI-DSS-1.3"
  annotations:
    description: "Default deny-all NetworkPolicy — zero-trust baseline for InvitISE fintech namespace"
    compliance: "CIS-5.3.1, NIST-SC-7, ISO27001-A.13.1.3, PCI-DSS-1.3"
    owner: "security-team@invitise.com"
spec:
  podSelector: {}   # Selects ALL pods in this namespace
  policyTypes:
    - Ingress
    - Egress
  # No ingress or egress rules = deny everything by default

---
# Same policy for payment-processing namespace (PCI-DSS scope)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: payment-processing
  labels:
    app.kubernetes.io/managed-by: "security-team"
    compliance: "PCI-DSS-1.3,CIS-5.3.1"
  annotations:
    description: "Default deny-all for PCI-DSS scoped payment namespace"
    compliance: "PCI-DSS-1.3, NIST-SC-7, ISO27001-A.13.1.3"
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
