# ============================================================
# OPA Gatekeeper — Require Read-Only Root Filesystem
# CIS Benchmark: 5.2.1 | NIST: SI-3, SI-7 | ISO 27001: A.12.6
# Prevents container filesystem tampering — critical for
# financial services platform hardening
# ============================================================
apiVersion: templates.gatekeeper.sh/v1
kind: ConstraintTemplate
metadata:
  name: k8srequirereadonlyrootfs
  annotations:
    description: "Requires containers to use a read-only root filesystem"
    compliance: "CIS-5.2.1, NIST-SI-7, ISO27001-A.12.6"
    owner: "security-team@invitise.com"
spec:
  crd:
    spec:
      names:
        kind: K8sRequireReadOnlyRootFs
      validation:
        openAPIV3Schema:
          type: object
          properties:
            exemptImages:
              type: array
              items:
                type: string
  targets:
    - target: admission.k8s.gatekeeper.sh
      rego: |
        package k8srequirereadonlyrootfs

        import future.keywords.contains
        import future.keywords.if

        violation contains msg if {
          input.review.kind.kind == "Pod"
          some container in input.review.object.spec.containers
          not exempt_container(container)
          not container.securityContext.readOnlyRootFilesystem
          msg := sprintf(
            "Container '%v' in Pod '%v' must have readOnlyRootFilesystem: true (CIS 5.2.1)",
            [container.name, input.review.object.metadata.name]
          )
        }

        violation contains msg if {
          input.review.kind.kind == "Pod"
          some container in input.review.object.spec.initContainers
          not exempt_container(container)
          not container.securityContext.readOnlyRootFilesystem
          msg := sprintf(
            "InitContainer '%v' in Pod '%v' must have readOnlyRootFilesystem: true (CIS 5.2.1)",
            [container.name, input.review.object.metadata.name]
          )
        }

        exempt_container(container) if {
          some exempt_image in input.parameters.exemptImages
          startswith(container.image, exempt_image)
        }

---
# Constraint — enforce on all non-system namespaces
apiVersion: constraints.gatekeeper.sh/v1beta1
kind: K8sRequireReadOnlyRootFs
metadata:
  name: require-readonly-rootfs-all-pods
  annotations:
    compliance: "CIS-5.2.1, NIST-SI-7, PCI-DSS-6.3"
spec:
  enforcementAction: deny
  match:
    kinds:
      - apiGroups: [""]
        kinds: ["Pod"]
    excludedNamespaces:
      - kube-system
      - kube-public
      - gatekeeper-system
  parameters:
    exemptImages:
      - "gcr.io/distroless/"
      - "registry.k8s.io/pause:"
